<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ศูนย์ดูแลวาร์ฟาริน · Warfarin Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   Design tokens
   ============================================================ */
:root {
  --teal-900: #0a3b35;
  --teal-800: #0e4f47;
  --teal-700: #156055;
  --teal-glow: rgba(35,160,140,.28);
  --gold: #c6892b;
  --gold-soft: #e5a23e;
  --gold-200: #f0dca6;
  --cream: #fbf8f1;
  --cream-2: #f4efe3;
  --ink: #20302c;
  --ink-soft: rgba(255,255,255,.62);
  --ink-dim: rgba(255,255,255,.38);
  --line: rgba(255,255,255,.10);

  /* sidebar geometry */
  --sb-w: 292px;
  --sb-min: 72px;

  /* animation */
  --dur: 0.34s;
  --ease: cubic-bezier(.4,0,.2,1);
  --ease-out: cubic-bezier(0,.8,.4,1);

  --shadow: 0 20px 50px -24px rgba(10,59,53,.55);
}

/* ============================================================
   Reset
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: "Sarabun", -apple-system, sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   App shell — flexbox so sidebar width drives layout naturally
   ============================================================ */
.app {
  position: relative;   /* anchor for floating collapse-btn */
  display: flex;
  height: 100dvh;
}

/* ============================================================
   Sidebar
   ============================================================ */
.sidebar {
  flex: 0 0 var(--sb-w);
  width: var(--sb-w);
  overflow: hidden;          /* clip content during animation */
  position: relative;
  background:
    radial-gradient(130% 65% at 0% 0%, var(--teal-glow), transparent 60%),
    linear-gradient(180deg, var(--teal-800) 0%, var(--teal-900) 100%);
  color: #fff;
  display: flex;
  flex-direction: column;
  padding: 20px 16px;
  z-index: 40;
  /* Transition width + padding-inline together for seamless squeeze */
  transition:
    width           var(--dur) var(--ease),
    flex-basis      var(--dur) var(--ease),
    padding-inline  var(--dur) var(--ease);
}

/* Gold seam — always at the right edge of sidebar (clips with overflow:hidden) */
.sidebar::after {
  content: "";
  position: absolute;
  inset: 0 0 0 auto;
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, var(--gold) 40%, var(--gold-soft) 60%, transparent 100%);
  opacity: .40;
  pointer-events: none;
}

/* === COLLAPSED state === */
.is-collapsed .sidebar {
  flex-basis: var(--sb-min);
  width: var(--sb-min);
  padding-inline: 0;
  /* sidebar is now 72 px wide, padding-inline 0 */
}

/* ---- Brand ---- */
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 4px 2px;
  margin-bottom: 24px;
  min-height: 48px;
  transition:
    gap          var(--dur) var(--ease),
    padding      var(--dur) var(--ease),
    margin-bottom var(--dur) var(--ease);
}
/* Center 42px brand-mark in 72px collapsed sidebar:
   (72 − 42) / 2 = 15 px                                      */
.is-collapsed .brand {
  gap: 0;
  padding: 4px 15px 2px;
  margin-bottom: 20px;
}

.brand-mark {
  flex: 0 0 42px;
  width: 42px; height: 42px;
  border-radius: 13px;
  display: grid; place-items: center;
  background: linear-gradient(145deg, var(--gold-soft), var(--gold));
  box-shadow: 0 8px 22px -10px rgba(198,137,43,.80), inset 0 1px 0 rgba(255,255,255,.30);
  color: var(--teal-900);
  flex-shrink: 0;
}
.brand-mark svg { width: 24px; height: 24px; }

/* Brand text slides away with max-width */
.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  max-width: 240px;
  opacity: 1;
  transition:
    max-width calc(var(--dur) * 1.0) var(--ease),
    opacity   calc(var(--dur) * 0.65) var(--ease);
}
.is-collapsed .brand-text { max-width: 0; opacity: 0; }
.brand-text .th { font-weight: 700; font-size: 15px; }
.brand-text .en { font-size: 11px; color: var(--gold-200); letter-spacing: 1.2px; text-transform: uppercase; font-weight: 600; }

/* ---- Section label ---- */
.nav-label {
  font-size: 10.5px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--ink-dim);
  font-weight: 600;
  padding: 0 10px;
  white-space: nowrap;
  overflow: hidden;
  max-height: 28px;
  opacity: 1;
  margin-bottom: 8px;
  transition:
    max-height    calc(var(--dur) * 0.9) var(--ease),
    opacity       calc(var(--dur) * 0.55) var(--ease),
    margin-bottom calc(var(--dur) * 0.9) var(--ease);
}
.is-collapsed .nav-label { max-height: 0; opacity: 0; margin-bottom: 0; }

/* ---- Nav ---- */
nav { display: flex; flex-direction: column; gap: 4px; }

.nav-item {
  position: relative;
  display: flex;
  align-items: center;
  gap: 13px;
  width: 100%;
  border: 0;
  background: transparent;
  color: var(--ink-soft);
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  text-align: start;
  /* Expanded: 10px inline padding, 11px block */
  padding: 11px 10px;
  margin-inline: 0;
  border-radius: 11px;
  cursor: pointer;
  transition:
    background    0.22s var(--ease),
    color         0.22s var(--ease),
    gap           var(--dur) var(--ease),
    padding       var(--dur) var(--ease),
    margin-inline var(--dur) var(--ease),
    border-radius var(--dur) var(--ease),
    transform     0.12s;
}
/*
  Collapsed: sidebar 72px, padding-inline 0 → nav-item full 72px.
  Give 4px side margin → 72−8 = 64px item.
  Center 26px icon: (64−26)/2 = 19px inline padding.
  19 + 26 + 19 = 64 ✓
*/
.is-collapsed .nav-item {
  padding: 11px 19px;
  margin-inline: 4px;
  gap: 0;
  border-radius: 10px;
}

.nav-item:hover { background: rgba(255,255,255,.085); color: #fff; }
.nav-item:active { transform: scale(0.975); }

.nav-item.active {
  background: linear-gradient(105deg, rgba(229,162,62,.22), rgba(229,162,62,.05));
  color: #fff;
}
.nav-item.active .ico { color: var(--gold-soft); }

/* Active indicator bar — left: 0, always inside sidebar */
.nav-item.active::before {
  content: "";
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 24px;
  border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg, var(--gold-soft), var(--gold));
  box-shadow: 0 0 10px rgba(198,137,43,.75);
  transition: height var(--dur) var(--ease);
}
/* Indicator grows slightly taller in icon-only mode for visual weight */
.is-collapsed .nav-item.active::before { height: 32px; }

/* Icon container */
.nav-item .ico {
  flex: 0 0 26px;
  width: 26px; height: 26px;
  display: grid; place-items: center;
  color: inherit;
  transition: color 0.22s;
}
.nav-item .ico svg { width: 22px; height: 22px; stroke-width: 1.9; }

/* Text — slides away via max-width */
.nav-item .txt {
  overflow: hidden;
  white-space: nowrap;
  max-width: 220px;
  opacity: 1;
  transition:
    max-width calc(var(--dur) * 1.0) var(--ease),
    opacity   calc(var(--dur) * 0.60) var(--ease);
}
.is-collapsed .nav-item .txt { max-width: 0; opacity: 0; }

/* ---- Tooltip (icon-only hover) ---- */
/*
  ::before  → used by .active indicator  (only when .active present)
  ::after   → tooltip for all items
  Both are distinct and won't conflict.
*/
.nav-item::after {
  content: attr(data-tip);
  position: absolute;
  left: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%) translateX(-6px);
  white-space: nowrap;
  background: var(--teal-900);
  color: #fff;
  font-family: "Sarabun", sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,.10);
  box-shadow: 0 8px 24px -8px rgba(10,59,53,.60);
  pointer-events: none;
  opacity: 0;
  z-index: 200;
  transition:
    opacity   0.18s var(--ease),
    transform 0.18s var(--ease);
}
/* Only show tooltip in collapsed state on hover */
.is-collapsed .nav-item:hover::after {
  opacity: 1;
  transform: translateY(-50%) translateX(0);
}

/* ---- Spacer ---- */
.spacer { flex: 1; }

/* ---- Footer tip ---- */
.side-foot {
  border-top: 1px solid var(--line);
  padding-top: 14px;
  margin-top: 12px;
  max-height: 160px;
  overflow: hidden;
  opacity: 1;
  transition:
    max-height  var(--dur) var(--ease),
    opacity     calc(var(--dur) * 0.65) var(--ease),
    padding-top var(--dur) var(--ease),
    margin-top  var(--dur) var(--ease);
}
.is-collapsed .side-foot {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  margin-top: 0;
}
.tip {
  display: flex; gap: 10px; align-items: flex-start;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--line);
  border-radius: 11px;
  padding: 11px 12px;
}
.tip svg  { flex: 0 0 17px; width: 17px; height: 17px; color: var(--gold-soft); margin-top: 1px; }
.tip p    { font-size: 12px; line-height: 1.6; color: var(--ink-soft); }

/* ============================================================
   Floating collapse button
   Lives in .app (not inside sidebar) so overflow:hidden
   on sidebar doesn't clip it.
   Moves in sync with sidebar width via CSS transition.
   ============================================================ */
.collapse-btn {
  position: absolute;
  /* sit exactly on the sidebar's right edge */
  left: calc(var(--sb-w) - 13px);
  top: 28px;
  z-index: 60;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--cream-2);
  background: #fff;
  color: var(--teal-800);
  display: grid; place-items: center;
  cursor: pointer;
  box-shadow: 0 4px 16px -5px rgba(10,59,53,.42);
  transition:
    left       var(--dur) var(--ease),
    background 0.18s,
    box-shadow 0.18s;
}
.collapse-btn svg {
  width: 15px; height: 15px;
  transition: transform var(--dur) var(--ease);
}
/* Move button in sync with collapsed sidebar */
.is-collapsed .collapse-btn { left: calc(var(--sb-min) - 13px); }
/* Rotate chevron 180° when collapsed (← becomes →) */
.is-collapsed .collapse-btn svg { transform: rotate(180deg); }
.collapse-btn:hover {
  background: var(--teal-800);
  color: #fff;
  box-shadow: 0 6px 20px -6px rgba(10,59,53,.55);
}

/* ============================================================
   Main content
   ============================================================ */
.main {
  position: relative;
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(140% 80% at 100% 0%, rgba(240,220,166,.28), transparent 55%),
    var(--cream);
}

/* ---- Topbar ---- */
.topbar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 24px;
  background: rgba(251,248,241,.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(14,79,71,.10);
  z-index: 10;
}
.menu-btn {
  display: none;
  width: 40px; height: 40px;
  border: 1px solid rgba(14,79,71,.15);
  background: #fff;
  border-radius: 11px;
  color: var(--teal-800);
  cursor: pointer;
  place-items: center;
}
.menu-btn svg { width: 21px; height: 21px; }

.crumb { display: flex; flex-direction: column; line-height: 1.2; min-width: 0; }
.crumb .eyebrow { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); font-weight: 700; }
.crumb .title   { font-size: 18.5px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.actions { margin-inline-start: auto; display: flex; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px;
  border: 1px solid rgba(14,79,71,.13);
  background: #fff;
  border-radius: 11px;
  color: var(--teal-800);
  cursor: pointer;
  display: grid; place-items: center;
  transition: background .18s, color .18s, transform .12s;
}
.icon-btn svg { width: 19px; height: 19px; }
.icon-btn:hover { background: var(--teal-800); color: #fff; }
.icon-btn:active { transform: scale(0.93); }

/* ---- Viewport & iframe ---- */
.viewport { position: relative; flex: 1; min-height: 0; }

.frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: 0;
  background: var(--cream);
  opacity: 0;
  transform: translateY(7px);
  transition: opacity .40s var(--ease-out), transform .40s var(--ease-out);
}
.frame.ready { opacity: 1; transform: none; }

/* ---- Loader overlay ---- */
.loader {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  background: var(--cream);
  z-index: 5;
  opacity: 0; pointer-events: none;
  transition: opacity .28s var(--ease);
}
.loader.show { opacity: 1; pointer-events: auto; }
.spin-wrap { display: flex; flex-direction: column; align-items: center; gap: 15px; }
.spinner {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 3px solid rgba(14,79,71,.12);
  border-top-color: var(--gold);
  animation: spin .7s linear infinite;
}
.loader-lbl { color: var(--teal-800); font-weight: 600; font-size: 14px; letter-spacing: .2px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ============================================================
   Mobile scrim
   ============================================================ */
.scrim {
  position: fixed; inset: 0;
  background: rgba(10,59,53,.45);
  backdrop-filter: blur(2px);
  opacity: 0; pointer-events: none;
  transition: opacity .28s var(--ease);
  z-index: 30;
}
.scrim.show { opacity: 1; pointer-events: auto; }

/* ============================================================
   Responsive — mobile (<= 860 px)
   Sidebar becomes a slide-in drawer; collapse button hidden.
   ============================================================ */
@media (max-width: 860px) {
  .app { display: block; }

  .sidebar {
    position: fixed;
    inset: 0 auto 0 0;
    /* Force full-width sidebar on mobile regardless of collapsed state */
    width: var(--sb-w) !important;
    flex-basis: var(--sb-w) !important;
    padding-inline: 16px !important;
    transform: translateX(-108%);
    transition: transform var(--dur) var(--ease);
    box-shadow: var(--shadow);
  }
  .app.nav-open .sidebar { transform: translateX(0); }

  /* Hide collapse button on mobile */
  .collapse-btn { display: none !important; }
  /* Show hamburger */
  .menu-btn { display: grid !important; }

  /* Restore all is-collapsed overrides when on mobile */
  .is-collapsed .brand          { padding: 4px 4px 2px !important; gap: 10px !important; margin-bottom: 24px !important; }
  .is-collapsed .brand-text     { max-width: 240px !important; opacity: 1 !important; }
  .is-collapsed .nav-label      { max-height: 28px !important; opacity: 1 !important; margin-bottom: 8px !important; }
  .is-collapsed .nav-item       { padding: 11px 10px !important; margin-inline: 0 !important; gap: 13px !important; border-radius: 11px !important; }
  .is-collapsed .nav-item .txt  { max-width: 220px !important; opacity: 1 !important; }
  .is-collapsed .side-foot      { max-height: 160px !important; opacity: 1 !important; padding-top: 14px !important; margin-top: 12px !important; }
  /* No tooltip on touch */
  .is-collapsed .nav-item:hover::after { opacity: 0 !important; }

  .main { width: 100%; }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">

    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <!-- หยดยา + pulse -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2.5c3.2 4 5.5 6.7 5.5 9.6A5.5 5.5 0 0 1 12 17.6a5.5 5.5 0 0 1-5.5-5.5C6.5 9.2 8.8 6.5 12 2.5Z"/>
          <path d="M9.4 11.2c.5-1 1.5-1.6 2.6-1.6s2.1.6 2.6 1.6"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="th">ศูนย์ดูแลวาร์ฟาริน</span>
        <span class="en">Warfarin Suite</span>
      </div>
    </div>

    <div class="nav-label">เมนูหลัก</div>

    <nav id="nav" role="tablist">

      <button class="nav-item" data-app="guide" data-tip="คู่มือผู้ป่วย" role="tab" aria-selected="false">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15.5H6.5A2.5 2.5 0 0 0 4 21V5.5Z"/>
            <path d="M4 18.5A2.5 2.5 0 0 1 6.5 16H20"/>
            <path d="M9 7.5h7M9 11h5"/>
          </svg>
        </span>
        <span class="txt">คู่มือผู้ป่วย</span>
      </button>

      <button class="nav-item" data-app="calendar" data-tip="ปฏิทินยา" role="tab" aria-selected="false">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3.5" y="5" width="17" height="16" rx="2.5"/>
            <path d="M3.5 9.5h17M8 3v4M16 3v4"/>
            <path d="M7.5 13h2M11 13h2M14.5 13h2M7.5 16.5h2M11 16.5h2"/>
          </svg>
        </span>
        <span class="txt">ปฏิทินยา</span>
      </button>

      <button class="nav-item" data-app="dose" data-tip="ปรับขนาดยา" role="tab" aria-selected="false">
        <span class="ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="7"  x2="20" y2="7"/>
            <circle cx="9"  cy="7"  r="2.4" fill="var(--teal-800)" stroke="currentColor" stroke-width="1.9"/>
            <line x1="4" y1="13" x2="20" y2="13"/>
            <circle cx="15" cy="13" r="2.4" fill="var(--teal-800)" stroke="currentColor" stroke-width="1.9"/>
            <line x1="4" y1="19" x2="20" y2="19"/>
            <circle cx="7"  cy="19" r="2.4" fill="var(--teal-800)" stroke="currentColor" stroke-width="1.9"/>
          </svg>
        </span>
        <span class="txt">ปรับขนาดยา</span>
      </button>

    </nav>

    <div class="spacer"></div>

    <div class="side-foot">
      <div class="tip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/>
        </svg>
        <p>ทั้ง 3 เครื่องมือทำงานแยกอิสระต่อกัน ข้อมูลปฏิทินถูกบันทึกไว้ในเครื่องของคุณ</p>
      </div>
    </div>

  </aside>

  <!-- ============ COLLAPSE TOGGLE (outside sidebar → not clipped) ============ -->
  <button class="collapse-btn" id="collapseBtn"
          title="ย่อ / ขยายแถบเมนู" aria-label="ย่อหรือขยายแถบเมนู">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <!-- ============ MAIN CONTENT ============ -->
  <main class="main">

    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="เปิดเมนู">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <div class="crumb">
        <span class="eyebrow" id="crumbEyebrow">Warfarin Suite</span>
        <span class="title"   id="crumbTitle">คู่มือผู้ป่วย</span>
      </div>

      <div class="actions">
        <button class="icon-btn" id="reloadBtn"
                title="โหลดหน้านี้ใหม่" aria-label="โหลดหน้านี้ใหม่">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
            <path d="M21 4v5h-5"/>
          </svg>
        </button>
        <button class="icon-btn" id="openBtn"
                title="เปิดในแท็บใหม่" aria-label="เปิดในแท็บใหม่">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 4h6v6"/>
            <path d="M20 4 10 14"/>
            <path d="M19 14v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="viewport">
      <iframe class="frame" id="frame"
              title="เนื้อหาแอป" referrerpolicy="no-referrer"></iframe>
      <div class="loader show" id="loader">
        <div class="spin-wrap">
          <div class="spinner"></div>
          <div class="loader-lbl" id="loaderLbl">กำลังโหลด…</div>
        </div>
      </div>
    </div>

  </main>
</div>

<div class="scrim" id="scrim"></div>

<script>
(function () {
  "use strict";

  /* ---- App registry ---- */
  var APPS = {
    guide:    { src: "warfarin-guide.html",        eyebrow: "ข้อมูลยา · Education",  title: "คู่มือผู้ป่วย" },
    calendar: { src: "warfarin-calendar.html",      eyebrow: "วางแผน · Schedule",     title: "ปฏิทินยา" },
    dose:     { src: "warfarin-dose-helper.html",   eyebrow: "คำนวณ · Dosing",        title: "ปรับขนาดยา" }
  };
  var ORDER = ["guide", "calendar", "dose"];
  var MIN_LOADER_MS = 280;

  /* ---- DOM refs ---- */
  var app         = document.getElementById("app");
  var nav         = document.getElementById("nav");
  var frame       = document.getElementById("frame");
  var loader      = document.getElementById("loader");
  var loaderLbl   = document.getElementById("loaderLbl");
  var crumbTitle  = document.getElementById("crumbTitle");
  var crumbEye    = document.getElementById("crumbEyebrow");
  var scrim       = document.getElementById("scrim");
  var collapseBtn = document.getElementById("collapseBtn");

  var current = null, pending = null, loaderTimer = null;

  /* ---- Loader helpers ---- */
  function showLoader(label) {
    loaderLbl.textContent = "กำลังโหลด " + label + " …";
    loader.classList.add("show");
    frame.classList.remove("ready");
  }
  function hideLoader() { loader.classList.remove("show"); }

  /* ---- Active highlight ---- */
  function setActive(key) {
    nav.querySelectorAll(".nav-item").forEach(function (btn) {
      var on = btn.dataset.app === key;
      btn.classList.toggle("active", on);
      btn.setAttribute("aria-selected", on ? "true" : "false");
    });
  }

  /* ---- Navigate ---- */
  function navigate(key, opts) {
    opts = opts || {};
    if (!APPS[key]) return;
    if (key === current && !opts.force) { closeMobileNav(); return; }

    var meta = APPS[key];
    current = key;
    pending = key;

    setActive(key);
    crumbTitle.textContent = meta.title;
    crumbEye.textContent   = meta.eyebrow;
    showLoader(meta.title);

    var t0 = Date.now();
    frame.onload = function () {
      if (pending !== key) return; // stale load — a newer request fired
      var wait = Math.max(0, MIN_LOADER_MS - (Date.now() - t0));
      clearTimeout(loaderTimer);
      loaderTimer = setTimeout(function () {
        hideLoader();
        frame.classList.add("ready");
      }, wait);
    };

    frame.src = meta.src + (opts.bust ? "?t=" + Date.now() : "");
    try { localStorage.setItem("wf_portal_active", key); } catch (e) {}
    closeMobileNav();
  }

  /* ---- Sidebar collapse ---- */
  function setCollapsed(val) {
    app.classList.toggle("is-collapsed", val);
    try { localStorage.setItem("wf_portal_collapsed", val ? "1" : "0"); } catch (e) {}
  }

  collapseBtn.addEventListener("click", function () {
    setCollapsed(!app.classList.contains("is-collapsed"));
  });

  /* ---- Mobile nav ---- */
  function openMobileNav()  { app.classList.add("nav-open");    scrim.classList.add("show"); }
  function closeMobileNav() { app.classList.remove("nav-open"); scrim.classList.remove("show"); }

  document.getElementById("menuBtn").addEventListener("click", openMobileNav);
  scrim.addEventListener("click", closeMobileNav);

  /* ---- Nav clicks ---- */
  nav.addEventListener("click", function (e) {
    var btn = e.target.closest(".nav-item");
    if (btn) navigate(btn.dataset.app);
  });

  /* ---- Topbar actions ---- */
  document.getElementById("reloadBtn").addEventListener("click", function () {
    if (current) navigate(current, { force: true, bust: true });
  });
  document.getElementById("openBtn").addEventListener("click", function () {
    if (current) window.open(APPS[current].src, "_blank");
  });

  /* ---- Keyboard shortcuts ---- */
  document.addEventListener("keydown", function (e) {
    if (/INPUT|TEXTAREA|SELECT/.test((e.target || {}).tagName || "")) return;
    var idx = ["1", "2", "3"].indexOf(e.key);
    if (idx > -1) navigate(ORDER[idx]);
    if (e.key === "Escape") closeMobileNav();
    /* [ or ] toggles collapse */
    if (e.key === "[" || e.key === "]") setCollapsed(!app.classList.contains("is-collapsed"));
  });

  /* ---- Restore persisted state ---- */
  (function () {
    try {
      if (localStorage.getItem("wf_portal_collapsed") === "1" && window.innerWidth > 860) {
        app.classList.add("is-collapsed");
      }
    } catch (e) {}

    var start = "guide";
    try {
      var saved = localStorage.getItem("wf_portal_active");
      if (saved && APPS[saved]) start = saved;
    } catch (e) {}
    navigate(start, { force: true });
  })();
})();
</script>
</body>
</html>
